# =======================================================
# Docker Compose — PRODUCTION (для развертывания на сервере)
# =======================================================
# Этот файл НЕ собирает образы локально, а скачивает их из DockerHub.
# Используйте на продакшн-сервере:
#   docker compose -f docker-compose.prod.yml up -d
# =======================================================

services:
  # 1. Бот (Python / aiogram)
  bot:
    image: lecannik/speech-to-text-bot:${IMAGE_TAG:-latest}
    container_name: stt_bot
    restart: always
    env_file: [.env]
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models  # Путь для кэширования Whisper-моделей
    volumes:
      - models_data:/app/models
    depends_on:
      - ollama
    networks:
      - bot_network

  # 2. Локальный сервер LLM (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: stt_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  models_data:
  ollama_data:
