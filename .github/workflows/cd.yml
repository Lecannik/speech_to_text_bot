# =======================================================
# GitHub Actions: CD Pipeline — Сборка, Публикация и Деплой
# =======================================================
# Запускается при push в main.
# Собирает Docker-образ, пушит в DockerHub, затем деплоит на целевую VM.
#
# Требуемые GitHub Secrets (настраиваются на уровне организации или репозитория):
#   DOCKERHUB_USERNAME — логин DockerHub
#   DOCKERHUB_TOKEN   — Access Token (PAT)
#   TELEGRAM_BOT_TOKEN — Токен служебного бота для уведомлений о деплое
#   TELEGRAM_CHAT_ID   — ID чата для уведомлений о деплое
#   BOT_TOKEN          — Токен основного рабочего бота для создания .env файла
# =======================================================

name: CD — Build, Push & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа
  # ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/speech-to-text-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/speech-to-text-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # ДЕПЛОЙ
  # ──────────────────────────────────────────────────────
  deploy:
    runs-on: [self-hosted, speech-to-text-bot]
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
          echo "WHISPER_MODEL_SIZE=medium" >> .env
          echo "WHISPER_DEVICE=cpu" >> .env
          echo "WHISPER_COMPUTE_TYPE=int8" >> .env
          echo "OLLAMA_HOST=http://ollama:11434" >> .env
          echo "OLLAMA_MODEL=qwen2.5:3b" >> .env

      - name: Copy config files to server
        run: |
          ssh -o StrictHostKeyChecking=no nik@192.168.20.29 "mkdir -p /opt/speech-to-text-bot"
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml .env nik@192.168.20.29:/opt/speech-to-text-bot/

      - name: Update application
        run: |
          ssh -o StrictHostKeyChecking=no nik@192.168.20.29 'bash -s' << 'EOF'
          set -e
          cd /opt/speech-to-text-bot
          export IMAGE_TAG=${{ github.sha }}
          
          # Pull с ретраями
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.prod.yml pull; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "❌ docker compose pull не удался после 3 попыток"
              exit 1
            fi
            echo "⚠️ pull сорвался (попытка $attempt/3), повтор через 10с..."
            sleep 10
          done
          
          docker compose -f docker-compose.prod.yml up -d
          
          # Очистка неиспользуемых образов
          docker image prune -f
          EOF

      - name: Verify Deployment (Healthcheck)
        run: |
          echo "⏳ Ожидаем запуск бота (15 секунд)..."
          sleep 15
          if ssh -o StrictHostKeyChecking=no nik@192.168.20.29 "docker inspect -f '{{.State.Running}}' stt_bot" | grep -q "true"; then
            echo "✅ Бот успешно запущен и работает в контейнере"
          else
            echo "❌ Бот не запустился или упал после старта"
            ssh -o StrictHostKeyChecking=no nik@192.168.20.29 "docker compose -f /opt/speech-to-text-bot/docker-compose.prod.yml logs --tail=50"
            exit 1
          fi

  # ──────────────────────────────────────────────────────
  # УВЕДОМЛЕНИЕ В TELEGRAM
  # ──────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    steps:
      - name: Send Telegram Notification
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Ручной запуск' }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ "$BUILD_RESULT" == "success" && "$DEPLOY_RESULT" == "success" ]]; then
            STATUS="✅ Успешно"
          else
            STATUS="❌ Ошибка"
          fi

          # Экранируем пользовательский ввод
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -c 200 | tr -cd '[:alnum:][:space:]:.,-/')
          SAFE_ACTOR=$(echo "$ACTOR" | tr -cd '[:alnum:]_-')

          MESSAGE="${STATUS}
          Проект: Speech to Text Bot
          Сборка: #${RUN_NUMBER}
          Автор: ${SAFE_ACTOR}
          Коммит: ${SAFE_MSG}
          https://github.com/${REPO}/actions/runs/${RUN_ID}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MESSAGE}"
